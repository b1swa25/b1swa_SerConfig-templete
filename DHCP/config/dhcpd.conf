option domain-name "b1swa.local";
option domain-name-servers 10.0.2.15, 8.8.8.8, 1.1.1.1;

default-lease-time 600;
max-lease-time 7200;

# Use this to enable/disable authoritative
authoritative;

# Subnet declaration
subnet 10.0.2.0 netmask 255.255.255.0 {
  range 10.0.2.100 10.0.2.150;
  option routers 10.0.2.15;
  option subnet-mask 255.255.255.0;
  option broadcast-address 10.0.2.255;
}
